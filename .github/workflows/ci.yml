name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint, tests, docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Configure CI environment
        run: |
          cat > .env <<'EOF'
          UV_PROJECT_ENVIRONMENT=/tmp/earnings-event-vol-venv
          PROJECT_NAME=earnings-event-vol
          MASSIVE_API_KEY_FILE=/tmp/massive_api_key
          MASSIVE_FLAT_FILE_KEY_FILE=/tmp/massive_flat_file_key
          EOF
          printf 'ci-placeholder\n' > /tmp/massive_api_key
          printf 'ci-placeholder\n' > /tmp/massive_flat_file_key

      - name: Check
        run: just check
