feature_schema:
  default_version: fe_v2_sec_xbrl
  resolved_report: artifacts/modeling/feature_schema_report.csv
  transform_params: artifacts/modeling/feature_transform_params.json
  selector_rule: "only model_feature=true rows in the resolved report may enter trainable models"
  signal_timestamp: event_entry_timestamp
  fe_v2_sec_xbrl:
    allow_families:
      - event_level
      - liquidity_execution_proxy
      - market_covariate
      - sequence_aggregate
      - rolling_earnings_history
      - train_fit_normalization
      - sec_xbrl_companyfacts
      - single_name_runup_proxy
      - single_name_surface_proxy
    block_exact:
      - cik
      - event_year
      - event_month
      - feature_asof_timestamp
      - event_entry_timestamp
      - signal_timestamp
      - split
      - target_id
      - feature_schema_version
    block_patterns:
      - accession
      - realized
      - post_event
      - exit_option_value
      - exit_intrinsic
      - gross_proxy_pnl_usd
      - haircut_pnl_usd
      - net_proxy_pnl_usd
    as_of_notes:
      - "same-ticker rolling history must satisfy prior_event_entry_timestamp < current_event_entry_timestamp"
      - "SEC XBRL uses acceptanceDateTime <= feature_asof_timestamp when mapped, else filed < feature_asof_date"
      - "entry-window features are allowed only because signal_timestamp == event_entry_timestamp"

event_level:
  - ivar_event
  - atm_iv_event_expiry
  - atm_iv_next_expiry
  - term_spread
  - rr25
  - bf25
  - iv_butterfly_25d
  - spread_over_mid
  - option_volume
  - open_interest
  - rv5
  - rv20
  - rv60
  - previous_earnings_move
  - last_four_earnings_average_move
  - spy_return
  - sector_etf_return
  - vix
  - bmo_amc_flag
  - market_cap_bucket

sequence_daily_state:
  lookback_trading_days: 20
  relaxed_robustness_lookback_trading_days: 10
  primary_missing_policy: "exclude_no_forward_fill"
  fields:
    - atm_iv
    - ivar_event_estimate
    - skew
    - butterfly
    - iv_butterfly_25d
    - term_spread
    - spread
    - volume
    - rv5
    - spy_return
    - vix

leakage_controls:
  require_feature_asof_timestamp: true
  block_vendor_forecast_fields_by_default: true
  block_same_event_realized_fields: true
  macro_cutoff:
    amc: "regular_close_on_announcement_date"
    bmo: "regular_close_on_previous_trading_date"
